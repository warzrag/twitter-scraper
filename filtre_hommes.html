function normalize(s) {
  if (!s) return '';
  let out = '';
  for (const c of s) out += UNICODE_MAP[c] || c;
  return out.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function detectGender(name) {
  if (!name) return 'unknown';
  const n = normalize(name);
  for (const kw of FEMALE_KEYWORDS) if (n.includes(kw)) return 'female';
  for (const kw of MALE_KEYWORDS) if (n.includes(kw)) return 'male';
  const first = (n.split(/\s+/)[0] || '').replace(/[^a-z]/g,'');
  if (!first) return 'unknown';
  if (MALE_NAMES.has(first)) return 'male';
  if (FEMALE_NAMES.has(first)) return 'female';
  for (const suf of FEMALE_SUFFIXES) if (first.endsWith(suf) && first.length > suf.length + 1) return 'female';
  for (const suf of MALE_SUFFIXES) if (first.endsWith(suf) && first.length > suf.length + 1) return 'male';
  if (first.endsWith('a') && first.length > 2) return 'female';
  if (first.endsWith('o') && first.length > 2) return 'male';
  return 'unknown';
}

function parseRobust(raw) {
  try { const d = JSON.parse(raw); if (Array.isArray(d)) return d; } catch {}
  try {
    const cleaned = raw.replace(/,(\s*[\]\}])/g, '$1');
    const d = JSON.parse(cleaned);
    if (Array.isArray(d)) return d;
  } catch {}
  const items = [];
  const pat1 = new RegExp('"screen_name"\\s*:\\s*"([^"]+)"[\\s\\S]{0,500}?"name"\\s*:\\s*"([^"]*)"', 'g');
  let match;
  while ((match = pat1.exec(raw)) !== null) {
    items.push({screen_name: match[1], name: match[2]});
  }
  if (items.length > 0) return items;
  const pat2 = new RegExp('"name"\\s*:\\s*"([^"]*)"[\\s\\S]{0,500}?"screen_name"\\s*:\\s*"([^"]+)"', 'g');
  while ((match = pat2.exec(raw)) !== null) {
    items.push({name: match[1], screen_name: match[2]});
  }
  return items;
}

function filtrer() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) { alert('Colle du JSON'); return; }
  const data = parseRobust(raw);
  if (!data || data.length === 0) { alert('Aucune donnee trouvee'); return; }

  let men = [], women = 0;
  for (const item of data) {
    const name = item.name || item.full_name || '';
    const screen = item.screen_name || item.username || '';
    if (!screen) continue;
    const g = detectGender(name);
    if (g === 'female') women++;
    else men.push(screen); // male + unknown
  }

  document.getElementById('results').style.display = 'block';
  document.getElementById('sTotal').textContent = data.length;
  document.getElementById('sMen').textContent = men.length;
  document.getElementById('sOther').textContent = women;
  document.getElementById('output').value = men.join('\n');
}

async function filtrerServer() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) { alert('Colle du JSON'); return; }
  const data = parseRobust(raw);
  if (!data || data.length === 0) { alert('Aucune donnee trouvee'); return; }

  const url = prompt('URL du serveur VPS :', 'http://94.130.90.242:8000');
  if (!url) return;
  const user = prompt('Username :', 'florent');
  const pass = prompt('Password :', 'VideoMotion95!!');
  if (!user || !pass) return;

  const resp = await fetch(url + '/api/gender-filter', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa(user + ':' + pass)},
    body: JSON.stringify({data})
  }).then(r => r.json()).catch(e => ({error: e.message}));

  if (resp.error) { alert('Erreur : ' + resp.error); return; }

  document.getElementById('results').style.display = 'block';
  document.getElementById('sTotal').textContent = resp.total;
  const men = [...resp.males, ...resp.unknowns];
  document.getElementById('sMen').textContent = men.length;
  document.getElementById('sOther').textContent = resp.females.length;
  document.getElementById('output').value = men.join('\n');
}

function copier() {
  const t = document.getElementById('output').value;
  navigator.clipboard.writeText(t).then(() => alert('✅ ' + t.split('\n').filter(l=>l).length + ' usernames copiés !'));
}
